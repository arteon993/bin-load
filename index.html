<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <title>빈슐랭 로드 — 안면도 1박 2일</title>

  <!-- OG / 카톡 공유 미리보기 -->
  <meta property="og:title" content="빈슐랭 로드 — 안면도 1박 2일">
  <meta property="og:description" content="2026.05.04 ~ 05.05 · 어른 4 + 6세 아이 2 · 가족 여행 일정">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://via.placeholder.com/800x420/0a0a0a/d4af37?text=BIN+MICHELIN+ROAD">

  <!-- 폰트 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Noto+Serif+KR:wght@500;700&family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
  <!-- Leaflet (지도) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

  <!-- 로더 -->
  <div class="loader">
    <div class="loader-dot"></div>
    <div class="loader-text">BIN MICHELIN ROAD</div>
  </div>

  <!-- 배경음악 -->
  <audio id="bgm" loop preload="auto">
    <source src="assets/bgm.mp3" type="audio/mpeg">
  </audio>

  <!-- 1. 인트로 -->
  <section class="view view-intro active" data-view="intro">
    <video id="intro-video" class="intro-video" muted playsinline preload="auto" webkit-playsinline>
      <source src="assets/intro.mp4" type="video/mp4">
    </video>
    <div class="intro-overlay-dark" id="intro-overlay"></div>
    <div class="intro-start-screen" id="intro-start">
      <div class="intro-start-brand latin">BIN MICHELIN ROAD</div>
      <div class="intro-start-title serif">빈슐랭 로드</div>
      <div class="intro-start-divider"></div>
      <div class="intro-start-sub">ANMYEONDO TRIP</div>
      <button type="button" class="intro-enter-bottom latin" id="intro-enter" tabindex="-1">TAP TO START ▶</button>
    </div>
    <button class="intro-skip latin" id="intro-skip">SKIP →</button>
  </section>

  <!-- 2. 메뉴 -->
  <section class="view view-menu" data-view="menu"></section>

  <!-- 3. Trip A -->
  <section class="view view-a" data-view="a"></section>

  <!-- 4. Trip B -->
  <section class="view view-b" data-view="b"></section>

  <!-- 5. 비교 -->
  <section class="view view-compare" data-view="compare"></section>

  <!-- 6. 복귀 (5/5) -->
  <section class="view view-return" data-view="return"></section>

  <!-- 7. 펜션 주변 편의시설 -->
  <section class="view view-facilities" data-view="facilities"></section>

  <!-- 데이터 + 앱 (캐시버스터: 수정 시 자동 반영) -->
  <script src="js/data.js?v=20260429n"></script>
  <script src="js/app.js?v=20260429n"></script>
  <script>
    // 인트로 D-Day 즉시 표시
    document.addEventListener('DOMContentLoaded', () => {
      const dday = document.getElementById('intro-dday');
      if (dday && window.DATA) {
        const today = new Date();
        const target = new Date(window.DATA.META.startDate);
        const diff = Math.ceil((target - today) / (1000 * 60 * 60 * 24));
        dday.textContent = diff > 0 ? `D-${diff}` : (diff === 0 ? 'D-DAY' : `D+${Math.abs(diff)}`);
      }
    });
  </script>
</body>
</html>
